spring.application.name=ReefRadar

spring.datasource.url=jdbc:postgresql://localhost:5432/reefradar
spring.datasource.username=reefradar
spring.datasource.password=reefradar_password

spring.jpa.hibernate.ddl-auto=validate
spring.jpa.open-in-view=false
spring.jpa.show-sql=true

spring.flyway.enabled=true

app.jwt.secret=${JWT_SECRET:local-development-secret-key-32-chars}
app.jwt.expiration=PT2H

# Apply migrations only on an intentional application restart, not while a file is being edited.
spring.devtools.restart.additional-exclude=db/migration/**
